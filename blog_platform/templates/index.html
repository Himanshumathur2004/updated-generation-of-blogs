<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Generation Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .account-selector { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .account-btn { padding: 10px 18px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .account-btn:hover, .account-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stat-number { font-size: 36px; font-weight: 700; color: #667eea; margin: 12px 0; }
        .controls { background: white; padding: 24px; border-radius: 12px; margin-bottom: 30px; display: flex; gap: 12px; flex-wrap: wrap; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #f0f0f0; color: #333; border: 2px solid #ddd; }
        .btn-secondary:hover { background: #e0e0e0; }
        .blogs-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .blogs-header { padding: 24px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .blogs-header h2 { font-size: 20px; color: #333; }
        .filter-buttons { display: flex; gap: 8px; }
        .filter-btn { padding: 8px 16px; border: 2px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; }
        .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .blogs-list { padding: 20px; max-height: 600px; overflow-y: auto; }
        .blog-item { padding: 16px; border-bottom: 1px solid #ddd; }
        .blog-item:hover { background: #f9f9f9; }
        .blog-title { font-weight: 700; color: #333; margin-bottom: 8px; }
        .blog-preview { color: #666; font-size: 14px; margin-bottom: 8px; }
        .blog-meta { display: flex; gap: 16px; font-size: 12px; color: #999; margin-bottom: 12px; }
        .blog-status { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .blog-status.draft { background: #fef3c7; color: #92400e; }
        .blog-status.posted { background: #d1fae5; color: #065f46; }
        .blog-actions { display: flex; gap: 10px; }
        .btn-copy { padding: 6px 12px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-copy:hover { background: #059669; }
        .empty-state { text-align: center; padding: 60px 30px; color: #999; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 40px; border-radius: 12px; max-width: 950px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #ddd; }
        .modal-header h2 { color: #333; font-size: 22px; margin: 0; }
        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #999; }
        .modal-close:hover { color: #333; }
        .copy-section { margin-bottom: 35px; }
        .copy-section h3 { color: #333; font-size: 16px; margin-bottom: 15px; font-weight: 600; }
        .copy-row { display: flex; gap: 15px; align-items: flex-start; }
        .copy-box { flex: 1; background: #f8f8f8; padding: 16px; border-radius: 8px; border: 1px solid #ddd; }
        .copy-box.title { font-weight: 700; font-size: 18px; min-height: 40px; padding: 12px 16px; display: flex; align-items: center; }
        .copy-box.body { min-height: 220px; max-height: 350px; overflow-y: auto; font-size: 14px; line-height: 1.6; color: #444; }
        .btn-copy-modal { padding: 10px 16px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
        .btn-copy-modal:hover { background: #059669; }
        
        .toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: white; padding: 16px 24px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } .controls { flex-direction: column; } .btn { width: 100%; } .copy-row { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Blog Generation Dashboard</h1>
            <p>Scrape → Analyze → Generate → Distribute</p>
            <div class="account-selector" id="accountSelector"></div>
        </header>

        <div class="dashboard">
            <div class="card">
                <h3>📊 Total Blogs</h3>
                <div class="stat-number" id="totalBlogs">0</div>
                <div style="font-size: 14px; color: #666;">
                    <div>✎ Draft: <strong id="draftCount">0</strong></div>
                    <div>✓ Posted: <strong id="postedCount">0</strong></div>
                </div>
            </div>
            <div class="card">
                <h3>🏷️ By Topic</h3>
                <div id="blogsByTopic" style="margin-top: 12px; font-size: 14px; color: #666;"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="bulkGenerateAll()">⚡ Bulk Generate (All Accounts)</button>
            <button class="btn btn-secondary" onclick="refreshDashboard()">🔄 Refresh</button>
            <button class="btn btn-secondary" onclick="showClearModal()">🗑️ Clear Blogs</button>
        </div>

        <div class="blogs-container">
            <div class="blogs-header">
                <h2>✨ Blog Library</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterBlogs('all')">All</button>
                    <button class="filter-btn" onclick="filterBlogs('draft')">Draft</button>
                    <button class="filter-btn" onclick="filterBlogs('posted')">Posted</button>
                </div>
            </div>
            <div class="blogs-list" id="blogsList"></div>
        </div>
    </div>

    <!-- Modal for copying -->
    <div id="copyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 Copy Blog Content</h2>
                <button class="modal-close" onclick="closeCopyModal()">✕</button>
            </div>
            
            <div class="copy-section">
                <h3>📌 Title</h3>
                <div class="copy-row">
                    <div class="copy-box title" id="modalTitle"></div>
                    <button class="btn-copy-modal" onclick="copyTitle()">📋 Copy</button>
                </div>
            </div>
            
            <div class="copy-section">
                <h3>📝 Description</h3>
                <div class="copy-row">
                    <div class="copy-box body" id="modalBody"></div>
                    <button class="btn-copy-modal" onclick="copyBody()">📋 Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentAccount = null;
        let currentFilter = 'all';
        let blogs = [];
        let currentBlogToCopy = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAccounts();
            await refreshDashboard();
        });

        async function loadAccounts() {
            try {
                const response = await fetch(`${API_BASE}/accounts`);
                const data = await response.json();
                const selector = document.getElementById('accountSelector');
                
                data.accounts.forEach(account => {
                    const btn = document.createElement('button');
                    btn.className = 'account-btn';
                    btn.textContent = account.name;
                    btn.onclick = () => selectAccount(account.account_id, btn);
                    selector.appendChild(btn);
                });

                if (data.accounts.length > 0) {
                    selectAccount(data.accounts[0].account_id, selector.children[0]);
                }
            } catch (err) {
                console.error('Error loading accounts:', err);
                showToast('Error loading accounts', 'error');
            }
        }

        function selectAccount(accountId, element) {
            currentAccount = accountId;
            currentFilter = 'all';
            document.querySelectorAll('.account-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            blogs = [];
            refreshDashboard();
        }

        async function refreshDashboard() {
            if (!currentAccount) return;
            try {
                const response = await fetch(`${API_BASE}/dashboard/${currentAccount}`);
                const data = await response.json();
                document.getElementById('totalBlogs').textContent = data.total_blogs || 0;
                document.getElementById('draftCount').textContent = data.status_breakdown?.draft || 0;
                document.getElementById('postedCount').textContent = data.status_breakdown?.posted || 0;
                const topicHtml = Object.entries(data.blogs_by_topic || {})
                    .map(([topic, count]) => `<div>• ${topic}: <strong>${count}</strong></div>`)
                    .join('');
                document.getElementById('blogsByTopic').innerHTML = topicHtml || '<div>No blogs yet</div>';
                await loadBlogs();
            } catch (err) {
                console.error('Error refreshing dashboard:', err);
            }
        }

        async function loadBlogs() {
            if (!currentAccount) return;
            try {
                const response = await fetch(`${API_BASE}/blogs?account_id=${currentAccount}`);
                const data = await response.json();
                blogs = data.blogs || [];
                renderBlogs();
            } catch (err) {
                console.error('Error loading blogs:', err);
            }
        }

        function filterBlogs(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderBlogs();
        }

        function renderBlogs() {
            const blogsList = document.getElementById('blogsList');
            let filtered = blogs;
            if (currentFilter !== 'all') {
                filtered = blogs.filter(b => b.status === currentFilter);
            }
            if (filtered.length === 0) {
                blogsList.innerHTML = '<div class="empty-state">📭 No blogs yet. Generate some to get started!</div>';
                return;
            }
            blogsList.innerHTML = filtered.map((blog, idx) => `
                <div class="blog-item">
                    <div class="blog-title">${escapeHtml(blog.title)}</div>
                    <div class="blog-preview">${escapeHtml((blog.body || '').substring(0, 100) + '...')}</div>
                    <div class="blog-meta">
                        <span>📅 ${new Date(blog.created_at).toLocaleDateString()}</span>
                        <span class="blog-status ${blog.status}">${blog.status}</span>
                    </div>
                    <div class="blog-actions">
                        <button class="btn-copy" data-blog-idx="${idx}" data-title="${escapeHtml(blog.title)}" data-body="${escapeHtml(blog.body || '')}">📋 Copy Blog</button>
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="markPosted('${blog._id}')">✓ Mark Posted</button>
                    </div>
                </div>
            `).join('');
            
            // Add event listeners to copy buttons
            document.querySelectorAll('.btn-copy').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const title = btn.getAttribute('data-title');
                    const body = btn.getAttribute('data-body');
                    const unescapedTitle = unescapeHtml(title);
                    const unescapedBody = unescapeHtml(body);
                    showCopyModal(unescapedTitle, unescapedBody);
                });
            });
        }

        function showCopyModal(title, body) {
            const unescapedTitle = unescapeHtml(title);
            const unescapedBody = unescapeHtml(body);
            document.getElementById('modalTitle').textContent = unescapedTitle;
            document.getElementById('modalBody').textContent = unescapedBody;
            currentBlogToCopy = { title: unescapedTitle, body: unescapedBody };
            document.getElementById('copyModal').classList.add('show');
        }

        function closeCopyModal() {
            document.getElementById('copyModal').classList.remove('show');
            currentBlogToCopy = null;
        }

        function copyTitle() {
            if (!currentBlogToCopy) return;
            navigator.clipboard.writeText(currentBlogToCopy.title).then(() => {
                showToast('✅ Title copied!', 'success');
            }).catch(err => {
                console.error('Failed to copy:', err);
                showToast('Error copying', 'error');
            });
        }

        function copyBody() {
            if (!currentBlogToCopy) return;
            navigator.clipboard.writeText(currentBlogToCopy.body).then(() => {
                showToast('✅ Description copied!', 'success');
            }).catch(err => {
                console.error('Failed to copy:', err);
                showToast('Error copying', 'error');
            });
        }

        async function bulkGenerateAll() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Bulk Generating...';
            try {
                const response = await fetch(`${API_BASE}/bulk-generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (response.ok) {
                    showToast(`✅ Generated ${data.total_variants_created} blog variants!`, 'success');
                    await refreshDashboard();
                } else {
                    showToast(`⚠️ ${data.error || 'Bulk generation failed'}`, 'error');
                }
            } catch (err) {
                console.error('Error in bulk generation:', err);
                showToast('Error in bulk generation', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '⚡ Bulk Generate (All Accounts)';
            }
        }

        async function markPosted(blogId) {
            try {
                const response = await fetch(`${API_BASE}/blogs/${blogId}/mark-posted`, {
                    method: 'PUT'
                });
                if (response.ok) {
                    showToast('Blog marked as posted!', 'success');
                    await loadBlogs();
                    await refreshDashboard();
                    // Reset filter to 'All' to see updated status clearly
                    currentFilter = 'all';
                    document.querySelectorAll('.filter-btn').forEach((btn, idx) => {
                        if (idx === 0) btn.classList.add('active');
                        else btn.classList.remove('active');
                    });
                } else {
                    const data = await response.json();
                    showToast(`Error: ${data.error}`, 'error');
                }
            } catch (err) {
                console.error('Error marking blog as posted:', err);
                showToast('Error marking blog as posted', 'error');
            }
        }

        function showClearModal() {
            if (confirm('Delete all draft blogs for this account?')) {
                clearAllBlogs();
            }
        }

        async function clearAllBlogs() {
            try {
                const draftBlogs = blogs.filter(b => b.status === 'draft');
                const deletePromises = draftBlogs.map(blog => 
                    fetch(`${API_BASE}/blogs/${blog._id}`, { method: 'DELETE' })
                );
                await Promise.all(deletePromises);
                showToast(`✅ Deleted ${draftBlogs.length} draft blogs!`, 'success');
                await refreshDashboard();
            } catch (err) {
                console.error('Error deleting blogs:', err);
                showToast('Error deleting blogs', 'error');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function unescapeHtml(text) {
            const div = document.createElement('div');
            div.innerHTML = text;
            return div.textContent;
        }

        document.addEventListener('click', (e) => {
            const modal = document.getElementById('copyModal');
            if (e.target === modal) {
                closeCopyModal();
            }
        });

        setInterval(() => {
            if (currentAccount && currentFilter === 'all') {
                refreshDashboard();
            }
        }, 30000);
    </script>
</body>
</html>
