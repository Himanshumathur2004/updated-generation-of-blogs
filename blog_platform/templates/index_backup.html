<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Generation Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0f172a;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .account-selector {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .account-btn {
            padding: 10px 18px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .account-btn:hover, .account-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #3b82f6;
            margin: 12px 0;
        }
        .controls {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #0f172a;
            border: 2px solid #e2e8f0;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        .blogs-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .blogs-header {
            padding: 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .blogs-header h2 {
            font-size: 20px;
            color: #0f172a;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .filter-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .blogs-list {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .blog-item {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .blog-item:hover {
            background: #f8fafc;
        }
        .blog-item.posted {
            background: #f0fdf4;
        }
        .blog-title {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .blog-preview {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .blog-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #94a3b8;
        }
        .blog-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }
        .blog-status.draft {
            background: #fef3c7;
            color: #92400e;
        }
        .blog-status.posted {
            background: #d1fae5;
            color: #065f46;
        }
        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #94a3b8;
        }
        .blog-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-copy {
            padding: 6px 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-copy:hover {
            background: #059669;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 900px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .modal-header h2 {
            color: #0f172a;
            font-size: 20px;
            margin: 0;
        }
        .modal-close {
            background: #f1f5f9;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 8px 12px;
            font-size: 24px;
            color: #64748b;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: #e2e8f0;
        }
        .copy-section {
            margin-bottom: 30px;
        }
        .copy-section h3 {
            color: #0f172a;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .copy-section-title {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }
        .copy-content {
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            line-height: 1.6;
            color: #1e293b;
            word-break: break-word;
            flex: 1;
        }
        .copy-content.title-content {
            font-weight: 700;
            font-size: 18px;
            min-height: 30px;
        }
        .copy-content.body-content {
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 14px;
        }
        .btn-copy-section {
            padding: 10px 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-copy-section:hover {
            background: #059669;
        }
        .btn-copy-section:active {
            transform: scale(0.95);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.success {
            background: #10b981;
        }
        .toast.error {
            background: #ef4444;
        }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .controls {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Blog Generation Dashboard</h1>
            <p>Intelligent blog generation platform: Scrape → Analyze → Generate</p>
            <div class="account-selector" id="accountSelector"></div>
        </header>

        <div class="dashboard">
            <div class="card">
                <h3>📊 Total Blogs</h3>
                <div class="stat-number" id="totalBlogs">0</div>
                <div style="font-size: 14px; color: #64748b;">
                    <div>✎ Draft: <strong id="draftCount">0</strong></div>
                    <div>✓ Posted: <strong id="postedCount">0</strong></div>
                </div>
            </div>

            <div class="card">
                <h3>🏷️ By Topic</h3>
                <div id="blogsByTopic" style="margin-top: 12px; font-size: 14px; color: #64748b;"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="bulkGenerateAll()">⚡ Bulk Generate (All Accounts)</button>
            <button class="btn btn-primary" onclick="generateBlogsNow()">🚀 Generate Blogs Now</button>
            <button class="btn btn-secondary" onclick="refreshDashboard()">🔄 Refresh</button>
            <button class="btn btn-secondary" onclick="showClearModal()">🗑️ Clear Blogs</button>
        </div>

        <div class="blogs-container">
            <div class="blogs-header">
                <h2>✨ Blog Library</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterBlogs('all')">All</button>
                    <button class="filter-btn" onclick="filterBlogs('draft')">Draft</button>
                    <button class="filter-btn" onclick="filterBlogs('posted')">Posted</button>
                </div>
            </div>
            <div class="blogs-list" id="blogsList"></div>
        </div>
    </div>

    <!-- Copy Blog Modal -->
    <div id="copyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 Copy Blog Content</h2>
                <button class="modal-close" onclick="closeCopyModal()">✕</button>
            </div>
            
            <!-- Title Section -->
            <div class="copy-section">
                <h3>📌 Title</h3>
                <div class="copy-section-title">
                    <div class="copy-content title-content" id="modalTitle"></div>
                    <button class="btn-copy-section" onclick="copyTitle()">📋 Copy</button>
                </div>
            </div>
            
            <!-- Body Section -->
            <div class="copy-section">
                <h3>📝 Description</h3>
                <div class="copy-section-title">
                    <div class="copy-content body-content" id="modalBody"></div>
                    <button class="btn-copy-section" onclick="copyBody()">📋 Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentAccount = null;
        let currentFilter = 'all';
        let blogs = [];
        let currentBlogToCopy = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAccounts();
            await refreshDashboard();
        });

        async function loadAccounts() {
            try {
                const response = await fetch(`${API_BASE}/accounts`);
                const data = await response.json();
                const selector = document.getElementById('accountSelector');
                
                data.accounts.forEach(account => {
                    const btn = document.createElement('button');
                    btn.className = 'account-btn';
                    btn.textContent = account.name;
                    btn.onclick = () => selectAccount(account.account_id, btn);
                    selector.appendChild(btn);
                });

                if (data.accounts.length > 0) {
                    selectAccount(data.accounts[0].account_id, selector.children[0]);
                }
            } catch (err) {
                console.error('Error loading accounts:', err);
                showToast('Error loading accounts', 'error');
            }
        }

        function selectAccount(accountId, element) {
            currentAccount = accountId;
            currentFilter = 'all';
            
            // Clear active state from all buttons
            document.querySelectorAll('.account-btn').forEach(btn => btn.classList.remove('active'));
            
            // Set active state on clicked button
            element.classList.add('active');
            
            // Reset blogs list and reload for new account
            blogs = [];
            refreshDashboard();
        }

        async function refreshDashboard() {
            if (!currentAccount) return;

            try {
                const response = await fetch(`${API_BASE}/dashboard/${currentAccount}`);
                const data = await response.json();

                document.getElementById('totalBlogs').textContent = data.total_blogs || 0;
                document.getElementById('draftCount').textContent = data.status_breakdown?.draft || 0;
                document.getElementById('postedCount').textContent = data.status_breakdown?.posted || 0;

                const topicHtml = Object.entries(data.blogs_by_topic || {})
                    .map(([topic, count]) => `<div>• ${topic}: <strong>${count}</strong></div>`)
                    .join('');
                document.getElementById('blogsByTopic').innerHTML = topicHtml || '<div>No blogs yet</div>';

                await loadBlogs();
            } catch (err) {
                console.error('Error refreshing dashboard:', err);
            }
        }

        async function loadBlogs() {
            if (!currentAccount) return;

            try {
                const response = await fetch(`${API_BASE}/blogs?account_id=${currentAccount}`);
                const data = await response.json();
                blogs = data.blogs || [];
                renderBlogs();
            } catch (err) {
                console.error('Error loading blogs:', err);
            }
        }

        function filterBlogs(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderBlogs();
        }

        function renderBlogs() {
            const blogsList = document.getElementById('blogsList');
            let filtered = blogs;

            if (currentFilter !== 'all') {
                filtered = blogs.filter(b => b.status === currentFilter);
            }

            if (filtered.length === 0) {
                blogsList.innerHTML = '<div class="empty-state">📭 No blogs yet. Generate some to get started!</div>';
                return;
            }

            blogsList.innerHTML = filtered.map(blog => `
                <div class="blog-item ${blog.status === 'posted' ? 'posted' : ''}">
                    <div class="blog-title">${escapeHtml(blog.title)}</div>
                    <div class="blog-preview">${escapeHtml((blog.body || '').substring(0, 100) + '...')}</div>
                    <div class="blog-meta">
                        <span>📅 ${new Date(blog.created_at).toLocaleDateString()}</span>
                        <span class="blog-status ${blog.status}">${blog.status}</span>
                    </div>
                    <div class="blog-actions">
                        <button class="btn-copy" onclick="showCopyModal('${escapeHtml(blog.title)}', '${escapeHtml(blog.body)}')">📋 Copy Blog</button>
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="markPosted('${blog._id}')">✓ Mark Posted</button>
                    </div>
                </div>
            `).join('');
        }

        function showCopyModal(title, body) {
            // Unescape HTML entities back to readable text
            const unescapedTitle = unescapeHtml(title);
            const unescapedBody = unescapeHtml(body);
            
            document.getElementById('modalTitle').textContent = unescapedTitle;
            document.getElementById('modalBody').textContent = unescapedBody;
            
            currentBlogToCopy = {
                title: unescapedTitle,
                body: unescapedBody
            };
            
            document.getElementById('copyModal').classList.add('show');
        }

        function closeCopyModal() {
            document.getElementById('copyModal').classList.remove('show');
            currentBlogToCopy = null;
        }

        function copyTitle() {
            if (!currentBlogToCopy) return;
            
            navigator.clipboard.writeText(currentBlogToCopy.title).then(() => {
                showToast('✅ Title copied to clipboard!', 'success');
            }).catch(err => {
                console.error('Failed to copy:', err);
                showToast('Error copying title', 'error');
            });
        }

        function copyBody() {
            if (!currentBlogToCopy) return;
            
            navigator.clipboard.writeText(currentBlogToCopy.body).then(() => {
                showToast('✅ Description copied to clipboard!', 'success');
            }).catch(err => {
                console.error('Failed to copy:', err);
                showToast('Error copying description', 'error');
            });
        }

        async function generateBlogsNow() {
            if (!currentAccount) return;

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            try {
                const response = await fetch(`${API_BASE}/blogs/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account_id: currentAccount })
                });

                const data = await response.json();
                
                if (response.ok) {
                    showToast(`✅ Generated ${data.generated_count} blogs!`, 'success');
                    await refreshDashboard();
                } else {
                    showToast(`⚠️ ${data.error || 'Generation failed'}`, 'error');
                }
            } catch (err) {
                console.error('Error generating blogs:', err);
                showToast('Error generating blogs', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Generate Blogs Now';
            }
        }

        async function bulkGenerateAll() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Bulk Generating...';

            try {
                const response = await fetch(`${API_BASE}/bulk-generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                
                if (response.ok) {
                    const totalBlogs = data.total_variants_created;
                    const accounts = data.variants_per_account;
                    let message = `✅ Generated ${totalBlogs} blog variants!\n`;
                    for (const [acc, count] of Object.entries(accounts)) {
                        message += `${acc}: ${count} blogs\n`;
                    }
                    showToast(message, 'success');
                    await refreshDashboard();
                } else {
                    showToast(`⚠️ ${data.error || 'Bulk generation failed'}`, 'error');
                }
            } catch (err) {
                console.error('Error in bulk generation:', err);
                showToast('Error in bulk generation', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '⚡ Bulk Generate (All Accounts)';
            }
        }

        async function markPosted(blogId) {
            try {
                const response = await fetch(`${API_BASE}/blogs/${blogId}/mark-posted`, {
                    method: 'PUT'
                });

                if (response.ok) {
                    showToast('Blog marked as posted!', 'success');
                    await loadBlogs();
                    await refreshDashboard();
                }
            } catch (err) {
                console.error('Error marking blog as posted:', err);
                showToast('Error marking blog as posted', 'error');
            }
        }

        function showClearModal() {
            if (confirm(`Delete all draft blogs for this account? This cannot be undone.`)) {
                clearAllBlogs();
            }
        }

        async function clearAllBlogs() {
            try {
                const draftBlogs = blogs.filter(b => b.status === 'draft');
                const deletePromises = draftBlogs.map(blog => 
                    fetch(`${API_BASE}/blogs/${blog._id}`, { method: 'DELETE' })
                );
                await Promise.all(deletePromises);
                showToast(`✅ Deleted ${draftBlogs.length} draft blogs!`, 'success');
                await refreshDashboard();
            } catch (err) {
                console.error('Error deleting blogs:', err);
                showToast('Error deleting blogs', 'error');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function unescapeHtml(text) {
            const div = document.createElement('div');
            div.innerHTML = text;
            return div.textContent;
        }

        // Close modal when clicking outside
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('copyModal');
            if (e.target === modal) {
                closeCopyModal();
            }
        });

        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (currentAccount && currentFilter === 'all') {
                refreshDashboard();
            }
        }, 30000);
    </script>
</body>
</html>
